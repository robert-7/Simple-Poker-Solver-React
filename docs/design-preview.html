<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Preview A - Slate Ledger</title>
    <style>
      :root {
        --bg: #f4f6f2;
        --surface: #ffffff;
        --surface-2: #eef2ea;
        --text: #162018;
        --muted: #4c5a4d;
        --accent: #1f7a4b;
        --accent-2: #dceee1;
        --border: #cfdbd0;
        --shadow: 0 14px 30px rgba(22, 32, 24, 0.12);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: radial-gradient(
            circle at 10% 0%,
            #e8efe5 0%,
            transparent 40%
          ),
          radial-gradient(circle at 90% 20%, #e2eee7 0%, transparent 30%),
          var(--bg);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .page {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 52px;
      }

      .hero {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-2);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(28px, 5vw, 46px);
        line-height: 1.05;
      }

      .lead {
        color: var(--muted);
        line-height: 1.55;
        max-width: 72ch;
      }

      .grid {
        display: grid;
        gap: 18px;
        margin-top: 20px;
      }

      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 1fr 1.1fr;
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 15px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        color: white;
        background: var(--accent);
      }

      .ghost {
        color: var(--accent);
        background: var(--accent-2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <span class="eyebrow">Design Preview A</span>
        <h1>Simplified Poker Solver</h1>
        <p class="lead">
          A calm, editorial look built for readability: strong hierarchy, soft
          surfaces, and clear result presentation.
        </p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Game Setup</h2>
          <div class="row">
            <label>Ante Value</label>
            <input type="number" value="1" />
          </div>
          <div class="row">
            <label>Bet Value</label>
            <input type="number" value="2" />
          </div>
          <div class="row">
            <label>Number of Cards in Deck</label>
            <input type="number" value="7" />
          </div>
          <div class="actions">
            <button class="primary">Solve</button>
            <button class="ghost">Reset</button>
          </div>
        </article>

        <article class="card">
          <h2>Results</h2>
          <table>
            <thead>
              <tr>
                <th>Player 1 Strategy</th>
                <th>Player 2 Strategy</th>
                <th>P1 Payoff</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>(1,0,0,0,0,1,1)</td>
                <td>(0,0,1,0,0,1,1)</td>
                <td>0.0952</td>
              </tr>
              <tr>
                <td>(1,0,0,0,0,1,1)</td>
                <td>(0,0,0,1,0,1,1)</td>
                <td>0.0952</td>
              </tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </body>
</html>
