---
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage thresholds
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and start containers
        run: docker compose up --build -d
      - name: Wait for HTTP endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080 > /dev/null; then
              echo "Smoke check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Smoke check failed: endpoint not ready after 30 seconds"
          exit 1
      - name: Show container status and logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200
      - name: Teardown containers
        if: always()
        run: docker compose down -v
